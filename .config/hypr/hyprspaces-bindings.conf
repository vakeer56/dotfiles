# hyprspaces-managed bindings
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
unbind = SUPER, mouse_up
unbind = SUPER, mouse_down

bindd = SUPER, code:10, Hyprspaces switch 1, exec, hyprctl dispatch hyprspaces:switch 1
bindd = SUPER, code:11, Hyprspaces switch 2, exec, hyprctl dispatch hyprspaces:switch 2
bindd = SUPER, code:12, Hyprspaces switch 3, exec, hyprctl dispatch hyprspaces:switch 3
bindd = SUPER, code:13, Hyprspaces switch 4, exec, hyprctl dispatch hyprspaces:switch 4
bindd = SUPER, code:14, Hyprspaces switch 5, exec, hyprctl dispatch hyprspaces:switch 5
bindd = SUPER, code:15, Hyprspaces switch 6, exec, hyprctl dispatch hyprspaces:switch 6
bindd = SUPER, code:16, Hyprspaces switch 7, exec, hyprctl dispatch hyprspaces:switch 7
bindd = SUPER, code:17, Hyprspaces switch 8, exec, hyprctl dispatch hyprspaces:switch 8
bindd = SUPER, code:18, Hyprspaces switch 9, exec, hyprctl dispatch hyprspaces:switch 9
bindd = SUPER, code:19, Hyprspaces switch 10, exec, hyprctl dispatch hyprspaces:switch 10

bindd = SUPER SHIFT, code:10, Hyprspaces move window 1, exec, hyprctl dispatch hyprspaces:move-window 1
bindd = SUPER SHIFT, code:11, Hyprspaces move window 2, exec, hyprctl dispatch hyprspaces:move-window 2
bindd = SUPER SHIFT, code:12, Hyprspaces move window 3, exec, hyprctl dispatch hyprspaces:move-window 3
bindd = SUPER SHIFT, code:13, Hyprspaces move window 4, exec, hyprctl dispatch hyprspaces:move-window 4
bindd = SUPER SHIFT, code:14, Hyprspaces move window 5, exec, hyprctl dispatch hyprspaces:move-window 5
bindd = SUPER SHIFT, code:15, Hyprspaces move window 6, exec, hyprctl dispatch hyprspaces:move-window 6
bindd = SUPER SHIFT, code:16, Hyprspaces move window 7, exec, hyprctl dispatch hyprspaces:move-window 7
bindd = SUPER SHIFT, code:17, Hyprspaces move window 8, exec, hyprctl dispatch hyprspaces:move-window 8
bindd = SUPER SHIFT, code:18, Hyprspaces move window 9, exec, hyprctl dispatch hyprspaces:move-window 9
bindd = SUPER SHIFT, code:19, Hyprspaces move window 10, exec, hyprctl dispatch hyprspaces:move-window 10

bindd = SUPER, LEFT, Hyprspaces move focus left, exec, hyprctl dispatch hyprspaces:movefocus l
bindd = SUPER, RIGHT, Hyprspaces move focus right, exec, hyprctl dispatch hyprspaces:movefocus r
bindd = SUPER, UP, Hyprspaces move focus up, exec, hyprctl dispatch hyprspaces:movefocus u
bindd = SUPER, DOWN, Hyprspaces move focus down, exec, hyprctl dispatch hyprspaces:movefocus d

bindd = SUPER SHIFT, LEFT, Hyprspaces move window left, exec, hyprctl dispatch hyprspaces:move-window l
bindd = SUPER SHIFT, RIGHT, Hyprspaces move window right, exec, hyprctl dispatch hyprspaces:move-window r
bindd = SUPER SHIFT, UP, Hyprspaces move window up, exec, hyprctl dispatch hyprspaces:move-window u
bindd = SUPER SHIFT, DOWN, Hyprspaces move window down, exec, hyprctl dispatch hyprspaces:move-window d

bindd = SUPER, mouse_up, Hyprspaces cycle prev, exec, hyprctl dispatch hyprspaces:cycle prev
bindd = SUPER, mouse_down, Hyprspaces cycle next, exec, hyprctl dispatch hyprspaces:cycle next

