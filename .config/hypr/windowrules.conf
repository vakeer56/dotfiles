windowrule = opacity 0.85 $& 0.75,match:class ^(com.obsproject.Studio)$
windowrule = opacity 0.85 $& 0.75,match:class ^(gnome-boxes)$
windowrule = opacity 0.85 $& 0.75,match:class ^(vesktop)$
windowrule = opacity 0.85 $& 0.75,match:class ^(discord)$
windowrule = opacity 0.85 $& 0.75,match:class ^(WebCord)$
windowrule = opacity 0.85 $& 0.75,match:class ^(ArmCord)$
windowrule = opacity 0.85 $& 0.75,match:class ^(app.drey.Warp)$
