windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(org.freedesktop.impl.portal.desktop)$

windowrule = opacity 0.80 $& 0.50 $& 1,match:class ^([Ss]team)$
windowrule = opacity 0.80 $& 0.50 $& 1,match:class ^(steamwebhelper)$

windowrule = opacity 0.80 $& 0.50 $& 1,match:class ^([Ss]potify)$
windowrule = opacity 0.80 $& 0.50 $& 1,match:initial_title ^(Spotify Free)$
windowrule = opacity 0.80 $& 0.50 $& 1,match:initial_title ^(Spotify Premium)$

windowrule = opacity 0.90 $& 0.65,match:class ^(com.github.rafostar.Clapper)$
windowrule = opacity 0.85 $& 0.75,match:class ^(com.github.tchx84.Flatseal)$
