# ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ‚ÄÉ‚Ėą‚ÄÉ‚Ėą‚ĖĎ‚ĖÄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖÄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚ĖÄ‚ĖĄ‚ĖÄ‚ĖĄ‚ĖÄ‚ÄÉ ‚ÄÉ‚Ėą‚ĖÄ‚ĖĄ‚ÄÉ‚Ėą‚ĖĄ‚Ėą‚ÄÉ‚Ėą‚ĖĄ‚ĖĄ‚ÄÉ‚Ėą‚Ėą‚ĖĄ‚ÄÉ‚ĖĄ‚Ėą

# See https://wiki.hyprland.org/Configuring/Window-Rules/

#? ------- WINDOWRULES_HYPRLAND_V_0_53 COMPATIBLE ----------------
#   This Config is compatible with windowrules changes in Hyprland v0.53+
#   Any future breaking changes disables this block and notifies the user to update.
#   User template files will be provided in $XDG_DATA_HOME/hyde/templates/hypr/windowrules.conf for manual update. 

# hyprlang if WINDOWRULES_HYPRLAND_V_0_53

# idle_inhibit rules
windowrule = idle_inhibit fullscreen true, match:class ^(.*celluloid.*)$|^(.*mpv.*)$|^(.*vlc.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen true, match:class ^(.*LibreWolf.*)$|^(.*floorp.*)$|^(.*brave-browser.*)$|^(.*firefox.*)$|^(.*chromium.*)$|^(.*zen.*)$|^(.*vivaldi.*)$

# Picture-in-Picture
windowrule {
    name = hyde_picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
    tag = +picture-in-picture
    tag = +hyde_picture_in_picture
    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.73) (monitor_h*0.72)
    size = (monitor_w*0.25) (monitor_h*0.25)
    pin = true
}

windowrule = opacity 0.90 $& 0.75 $& 1,match:class ^(firefox)$
windowrule = opacity 0.80 $& 0.75 $& 1,match:class ^(brave-browser)$

windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(code-oss)$
windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^([Cc]ode)$
windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(code-url-handler)$
windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(code-insiders-url-handler)$
windowrule = opacity 0.55 $& 0.55 $& 1,match:class ^(kitty)$
windowrule = opacity 0.88 $& 0.75 $& 1,match:class ^(org.kde.dolphin)$
windowrule = opacity 0.88 $& 0.75 $& 1,match:class ^(org.kde.ark)$
windowrule = opacity 0.88 $& 0.75 $& 1,match:class ^(nwg-look)$
windowrule = opacity 0.88 $& 0.75 $& 1,match:class ^(qt5ct)$
windowrule = opacity 0.88 $& 0.75 $& 1,match:class ^(qt6ct)$
windowrule = opacity 0.88 $& 0.75 $& 1,match:class ^(kvantummanager)$

windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(blueman-manager)$
windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(nm-applet)$
windowrule = opacity 0.85 $& 0.75 $& 1,match:class ^(nm-connection-editor)$
